apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  labels:
    cloud-provider: ${CLOUD_PROVIDER_AZURE_LABEL:=azure}
    cni: calico
  name: ${CLUSTER_NAME}
  namespace: default
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
      - 192.168.0.0/16
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: ${CLUSTER_NAME}-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: AzureCluster
    name: ${CLUSTER_NAME}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureCluster
metadata:
  name: ${CLUSTER_NAME}
  namespace: default
spec:
  additionalTags:
    buildProvenance: ${BUILD_PROVENANCE}
    creationTimestamp: ${TIMESTAMP}
    jobName: ${JOB_NAME}
  identityRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: AzureClusterIdentity
    name: ${CLUSTER_IDENTITY_NAME}
  location: ${AZURE_LOCATION}
  networkSpec:
    apiServerLB:
      frontendIPs:
      - name: ${CLUSTER_NAME}-api-lb
        publicIP:
          dnsName: ${CLUSTER_NAME}-${APISERVER_LB_DNS_SUFFIX}.${AZURE_LOCATION}.cloudapp.azure.com
          name: ${CLUSTER_NAME}-api-lb
      - name: ${CLUSTER_NAME}-internal-lb-private-ip
        privateIP: ${AZURE_INTERNAL_LB_PRIVATE_IP}
    subnets:
    - cidrBlocks:
      - ${AZURE_CP_SUBNET_CIDR}
      name: control-plane-subnet
      role: control-plane
    - cidrBlocks:
      - ${AZURE_NODE_SUBNET_CIDR}
      name: node-subnet
      role: node
    vnet:
      cidrBlocks:
      - ${AZURE_VNET_CIDR}
      name: ${AZURE_VNET_NAME:=${CLUSTER_NAME}-vnet}
  resourceGroup: ${AZURE_RESOURCE_GROUP:=${CLUSTER_NAME}}
  subscriptionID: ${AZURE_SUBSCRIPTION_ID}
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: ${CLUSTER_NAME}-control-plane
  namespace: default
spec:
  kubeadmConfigSpec:
    clusterConfiguration:
      apiServer:
        extraArgs: {}
        timeoutForControlPlane: 20m
      controllerManager:
        extraArgs:
          allocate-node-cidrs: "false"
          cloud-provider: external
          cluster-name: ${CLUSTER_NAME}
          v: "4"
      etcd:
        local:
          dataDir: /var/lib/etcddisk/etcd
          extraArgs:
            quota-backend-bytes: "8589934592"
    diskSetup:
      filesystems:
      - device: /dev/disk/azure/scsi1/lun0
        extraOpts:
        - -E
        - lazy_itable_init=1,lazy_journal_init=1
        filesystem: ext4
        label: etcd_disk
      - device: ephemeral0.1
        filesystem: ext4
        label: ephemeral0
        replaceFS: ntfs
      partitions:
      - device: /dev/disk/azure/scsi1/lun0
        layout: true
        overwrite: false
        tableType: gpt
    files:
    - contentFrom:
        secret:
          key: control-plane-azure.json
          name: ${CLUSTER_NAME}-control-plane-azure-json
      owner: root:root
      path: /etc/kubernetes/azure.json
      permissions: "0644"
    - content: "#!/bin/bash\n\nset -o nounset\nset -o pipefail\nset -o errexit\n\n#
        Stop kubelet to prevent conflicts during package installation\nsystemctl stop
        kubelet\n\ndeclare -a BINARIES=(\"kubeadm\" \"kubectl\" \"kubelet\")\n\n#
        Define the base URL and version\nBASE_URL=\"https://kubernetesreleases.blob.core.windows.net/dalec-packages\"\nVERSION=\"${KUBERNETES_VERSION}\"\nVERSION=$${VERSION#v}
        \ # Remove 'v' prefix if present\nOS_VERSION=\"ubuntu24.04\"\nARCH=\"amd64\"\nDEB_VERSION=\"ubuntu24.04u1\"\n\nfor
        BINARY in \"$${BINARIES[@]}\"; do\n  if [[ \"$${BINARY}\" == \"kubelet\" ]];
        then\n    DEB_VERSION=\"ubuntu24.04u1\"\n  else\n    DEB_VERSION=\"ubuntu24.04u2\"\n
        \ fi\n  echo \"* downloading and installing package: $${BINARY} $${VERSION}
        with deb version $${DEB_VERSION}\"\n  DEB_FILE=\"/tmp/$${BINARY}_$${VERSION}-$${DEB_VERSION}_$${ARCH}.deb\"\n
        \ DEB_URL=\"$${BASE_URL}/$${BINARY}/$${VERSION}/$${OS_VERSION}/$${ARCH}/$${BINARY}_$${VERSION}-$${DEB_VERSION}_$${ARCH}.deb\"\n
        \ \n  echo \"Downloading from: $${DEB_URL}\"\n  curl -L --retry 10 --retry-delay
        5 \"$${DEB_URL}\" --output \"$${DEB_FILE}\"\n  chmod 644 \"$${DEB_FILE}\"\n\n
        \ echo \"Installing $${DEB_FILE}\"\n  dpkg -i \"$${DEB_FILE}\"\n\n  # Clean
        up the downloaded deb file\n  rm -f \"$${DEB_FILE}\"\n  \n  # Validate binary
        installation\n  echo \"Installed $${BINARY}: $(which $${BINARY})\"\n  case
        $${BINARY} in\n    kubeadm)\n      echo \"kubeadm version: $(kubeadm version
        -o=short)\"\n      ;;\n    kubectl)\n      echo \"kubectl version: $(kubectl
        version --client=true --output=short)\"\n      ;;\n    kubelet)\n      echo
        \"kubelet version: $(kubelet --version)\"\n      ;;\n  esac\ndone\n\n# Ensure
        kubelet is stopped before kubeadm init (but keep it enabled for kubeadm to
        start)\nsystemctl stop kubelet\n\n# kubeadm-specific validation\necho \"===
        kubeadm Validation ===\"\n\n# Test kubeadm configuration functionality\necho
        \"Testing kubeadm config functionality...\"\nkubeadm config print init-defaults
        > /tmp/kubeadm-test.yaml\nif [ $? -ne 0 ]; then\n  echo \"ERROR: kubeadm config
        print failed\"\n  exit 1\nfi\n\n# Validate the configuration\necho \"Validating
        kubeadm configuration...\"\nkubeadm config validate --config /tmp/kubeadm-test.yaml\nif
        [ $? -ne 0 ]; then\n  echo \"ERROR: kubeadm config validation failed\"\n  exit
        1\nfi\n\n# Check kubeadm dependencies\necho \"Checking kubeadm binary dependencies...\"\nldd
        $(which kubeadm) | grep \"not found\" && {\n  echo \"ERROR: kubeadm has missing
        dependencies\"\n  exit 1\n} || echo \"kubeadm dependencies OK\"\n\n# Verify
        kubeadm can detect container runtime\necho \"Testing container runtime detection...\"\nkubeadm
        config images list > /dev/null 2>&1\nif [ $? -ne 0 ]; then\n  echo \"WARNING:
        kubeadm cannot detect container runtime properly\"\nelse\n  echo \"Container
        runtime detection OK\"\nfi\n\n# Check systemd service status\necho \"=== Service
        Status ===\"\necho \"kubelet service status: $(systemctl is-enabled kubelet)\"\necho
        \"kubelet active status: $(systemctl is-active kubelet)\"\n\n# Clean up test
        files\nrm -f /tmp/kubeadm-test.yaml\n\necho \"=== Binary Installation Complete
        ===\"\n"
      owner: root:root
      path: /tmp/replace-k8s-binaries.sh
      permissions: "0744"
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          cloud-provider: external
        name: '{{ ds.meta_data["local_hostname"] }}'
    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          cloud-provider: external
        name: '{{ ds.meta_data["local_hostname"] }}'
    mounts:
    - - LABEL=etcd_disk
      - /var/lib/etcddisk
    postKubeadmCommands:
    - |
      # Debug API server after kubeadm init
      echo "=== Post-kubeadm API Server Debug ==="
      echo "Checking if API server is running..."
      crictl ps | grep kube-apiserver || echo "No kube-apiserver container found"
      echo "Checking API server logs..."
      crictl logs $(crictl ps --name kube-apiserver -q) | tail -20 || echo "Could not get API server logs"
      echo "Checking what ports API server is listening on..."
      netstat -tlnp | grep :6443 || echo "No process listening on port 6443"
      echo "Testing local API server connectivity..."
      timeout 5 curl -k https://127.0.0.1:6443/livez || echo "Cannot reach API server on localhost"
      timeout 5 curl -k https://40.0.0.4:6443/livez || echo "Cannot reach API server on node IP"
      echo "Checking load balancer connectivity from node..."
      timeout 5 nc -zv ${AZURE_INTERNAL_LB_PRIVATE_IP} 6443 || echo "Cannot reach internal LB from node"
    preKubeadmCommands:
    - echo '${AZURE_INTERNAL_LB_PRIVATE_IP}   ${CLUSTER_NAME}-${APISERVER_LB_DNS_SUFFIX}.${AZURE_LOCATION}.cloudapp.azure.com'
      >> /etc/hosts
    - bash -c /tmp/replace-k8s-binaries.sh
    - |
      # Debug network connectivity before kubeadm init
      echo "=== Network Debug Info ==="
      cat /etc/hosts | grep ${CLUSTER_NAME}
      nslookup ${CLUSTER_NAME}-${APISERVER_LB_DNS_SUFFIX}.${AZURE_LOCATION}.cloudapp.azure.com || true
      ping -c 3 ${AZURE_INTERNAL_LB_PRIVATE_IP} || true
      # Test if we can reach the internal load balancer IP on port 6443
      timeout 10 nc -zv ${AZURE_INTERNAL_LB_PRIVATE_IP} 6443 || echo "Cannot reach internal LB on port 6443 yet (expected before kubeadm init)"
    verbosity: 10
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: AzureMachineTemplate
      name: ${CLUSTER_NAME}-control-plane
  replicas: ${CONTROL_PLANE_MACHINE_COUNT:=1}
  version: ${KUBERNETES_VERSION}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureMachineTemplate
metadata:
  name: ${CLUSTER_NAME}-control-plane
  namespace: default
spec:
  template:
    spec:
      dataDisks:
      - diskSizeGB: 256
        lun: 0
        nameSuffix: etcddisk
      disableVMBootstrapExtension: true
      identity: UserAssigned
      osDisk:
        diskSizeGB: 128
        osType: Linux
      sshPublicKey: ${AZURE_SSH_PUBLIC_KEY_B64:=""}
      userAssignedIdentities:
      - providerID: /subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/${CI_RG:=capz-ci}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/${USER_IDENTITY:=cloud-provider-user-identity}
      vmSize: ${AZURE_CONTROL_PLANE_MACHINE_TYPE}
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: ${CLUSTER_NAME}-md-0
  namespace: default
spec:
  clusterName: ${CLUSTER_NAME}
  replicas: ${WORKER_MACHINE_COUNT:=2}
  selector:
    matchLabels: null
  template:
    spec:
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: ${CLUSTER_NAME}-md-0
      clusterName: ${CLUSTER_NAME}
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: AzureMachineTemplate
        name: ${CLUSTER_NAME}-md-0
      version: ${KUBERNETES_VERSION}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureMachineTemplate
metadata:
  name: ${CLUSTER_NAME}-md-0
  namespace: default
spec:
  template:
    spec:
      disableVMBootstrapExtension: true
      identity: UserAssigned
      osDisk:
        diskSizeGB: 128
        osType: Linux
      sshPublicKey: ${AZURE_SSH_PUBLIC_KEY_B64:=""}
      userAssignedIdentities:
      - providerID: /subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/${CI_RG:=capz-ci}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/${USER_IDENTITY:=cloud-provider-user-identity}
      vmSize: ${AZURE_NODE_MACHINE_TYPE}
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: ${CLUSTER_NAME}-md-0
  namespace: default
spec:
  template:
    spec:
      files:
      - contentFrom:
          secret:
            key: worker-node-azure.json
            name: ${CLUSTER_NAME}-md-0-azure-json
        owner: root:root
        path: /etc/kubernetes/azure.json
        permissions: "0644"
      - content: "#!/bin/bash\n\nset -o nounset\nset -o pipefail\nset -o errexit\n\n#
          Stop kubelet to prevent conflicts during package installation\nsystemctl
          stop kubelet\n\ndeclare -a BINARIES=(\"kubeadm\" \"kubectl\" \"kubelet\")\n\n#
          Define the base URL and version\nBASE_URL=\"https://kubernetesreleases.blob.core.windows.net/dalec-packages\"\nVERSION=\"${KUBERNETES_VERSION}\"\nVERSION=$${VERSION#v}
          \ # Remove 'v' prefix if present\nOS_VERSION=\"ubuntu24.04\"\nARCH=\"amd64\"\nDEB_VERSION=\"ubuntu24.04u1\"\n\nfor
          BINARY in \"$${BINARIES[@]}\"; do\n  if [[ \"$${BINARY}\" == \"kubelet\"
          ]]; then\n    DEB_VERSION=\"ubuntu24.04u1\"\n  else\n    DEB_VERSION=\"ubuntu24.04u2\"\n
          \ fi\n  echo \"* downloading and installing package: $${BINARY} $${VERSION}
          with deb version $${DEB_VERSION}\"\n  DEB_FILE=\"/tmp/$${BINARY}_$${VERSION}-$${DEB_VERSION}_$${ARCH}.deb\"\n
          \ DEB_URL=\"$${BASE_URL}/$${BINARY}/$${VERSION}/$${OS_VERSION}/$${ARCH}/$${BINARY}_$${VERSION}-$${DEB_VERSION}_$${ARCH}.deb\"\n
          \ \n  echo \"Downloading from: $${DEB_URL}\"\n  curl -L --retry 10 --retry-delay
          5 \"$${DEB_URL}\" --output \"$${DEB_FILE}\"\n  chmod 644 \"$${DEB_FILE}\"\n\n
          \ echo \"Installing $${DEB_FILE}\"\n  dpkg -i \"$${DEB_FILE}\"\n\n  # Clean
          up the downloaded deb file\n  rm -f \"$${DEB_FILE}\"\n  \n  # Validate binary
          installation\n  echo \"Installed $${BINARY}: $(which $${BINARY})\"\n  case
          $${BINARY} in\n    kubeadm)\n      echo \"kubeadm version: $(kubeadm version
          -o=short)\"\n      ;;\n    kubectl)\n      echo \"kubectl version: $(kubectl
          version --client=true --output=short)\"\n      ;;\n    kubelet)\n      echo
          \"kubelet version: $(kubelet --version)\"\n      ;;\n  esac\ndone\n\n# Ensure
          kubelet is stopped before kubeadm join (but keep it enabled for kubeadm
          to start)\nsystemctl stop kubelet\n\n# kubeadm-specific validation for worker
          nodes\necho \"=== Worker Node kubeadm Validation ===\"\n\n# Test kubeadm
          configuration functionality\necho \"Testing kubeadm config functionality...\"\nkubeadm
          config print join-defaults > /tmp/kubeadm-join-test.yaml\nif [ $? -ne 0
          ]; then\n  echo \"ERROR: kubeadm config print join-defaults failed\"\n  exit
          1\nfi\n\n# Check kubeadm dependencies\necho \"Checking kubeadm binary dependencies...\"\nldd
          $(which kubeadm) | grep \"not found\" && {\n  echo \"ERROR: kubeadm has
          missing dependencies\"\n  exit 1\n} || echo \"kubeadm dependencies OK\"\n\n#
          Verify kubeadm can detect container runtime\necho \"Testing container runtime
          detection...\"\nkubeadm config images list > /dev/null 2>&1\nif [ $? -ne
          0 ]; then\n  echo \"WARNING: kubeadm cannot detect container runtime properly\"\nelse\n
          \ echo \"Container runtime detection OK\"\nfi\n\n# Check systemd service
          status\necho \"=== Service Status ===\"\necho \"kubelet service status:
          $(systemctl is-enabled kubelet)\"\necho \"kubelet active status: $(systemctl
          is-active kubelet)\"\n\n# Clean up test files\nrm -f /tmp/kubeadm-join-test.yaml\n\necho
          \"=== Worker Node Binary Installation Complete ===\"\n"
        owner: root:root
        path: /tmp/replace-k8s-binaries.sh
        permissions: "0744"
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            cloud-provider: external
          name: '{{ ds.meta_data["local_hostname"] }}'
      preKubeadmCommands:
      - echo '${AZURE_INTERNAL_LB_PRIVATE_IP}   ${CLUSTER_NAME}-${APISERVER_LB_DNS_SUFFIX}.${AZURE_LOCATION}.cloudapp.azure.com'
        >> /etc/hosts
      - echo '${AZURE_INTERNAL_LB_PRIVATE_IP}   ${CLUSTER_NAME}-${APISERVER_LB_DNS_SUFFIX}.${AZURE_LOCATION}.cloudapp.azure.com'
        >> /etc/hosts
      - bash -c /tmp/replace-k8s-binaries.sh
      - |
        # Debug network connectivity before kubeadm join
        echo "=== Worker Node Network Debug Info ==="
        cat /etc/hosts | grep ${CLUSTER_NAME}
        nslookup ${CLUSTER_NAME}-${APISERVER_LB_DNS_SUFFIX}.${AZURE_LOCATION}.cloudapp.azure.com || true
        ping -c 3 ${AZURE_INTERNAL_LB_PRIVATE_IP} || true
        # Test if we can reach the internal load balancer IP on port 6443
        timeout 10 nc -zv ${AZURE_INTERNAL_LB_PRIVATE_IP} 6443 || echo "Testing connection to internal LB on port 6443 for worker join"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureClusterIdentity
metadata:
  labels:
    clusterctl.cluster.x-k8s.io/move-hierarchy: "true"
  name: ${CLUSTER_IDENTITY_NAME}
  namespace: default
spec:
  allowedNamespaces: {}
  clientID: ${AZURE_CLIENT_ID_USER_ASSIGNED_IDENTITY}
  tenantID: ${AZURE_TENANT_ID}
  type: ${CLUSTER_IDENTITY_TYPE:=WorkloadIdentity}
---
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: calico
  namespace: default
spec:
  chartName: tigera-operator
  clusterSelector:
    matchLabels:
      cni: calico
  namespace: tigera-operator
  releaseName: projectcalico
  repoURL: https://docs.tigera.io/calico/charts
  valuesTemplate: |
    installation:
      cni:
        type: Calico
        ipam:
          type: Calico
      calicoNetwork:
        bgp: Disabled
        mtu: 1350
        ipPools:
        ipPools:{{range $i, $cidr := .Cluster.spec.clusterNetwork.pods.cidrBlocks }}
        - cidr: {{ $cidr }}
          encapsulation: VXLAN{{end}}
      typhaDeployment:
        spec:
          template:
            spec:
              affinity:
                nodeAffinity:
                  preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 50
                    preference:
                      matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: Exists
      registry: mcr.microsoft.com/oss
    # Image and registry configuration for the tigera/operator pod.
    tigeraOperator:
      image: tigera/operator
      registry: mcr.microsoft.com/oss
    calicoctl:
      image: mcr.microsoft.com/oss/calico/ctl
    # By default, tigera tolerates all NoSchedule taints. This breaks upgrades
    # when it continuously gets scheduled onto an out-of-date Node that is being
    # deleted. Tolerate only the NoSchedule taints that are expected.
    tolerations:
      - effect: NoExecute
        operator: Exists
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      - effect: NoSchedule
        key: node.kubernetes.io/not-ready
        operator: Exists
  version: ${CALICO_VERSION}
---
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: azuredisk-csi-driver-chart
  namespace: default
spec:
  chartName: azuredisk-csi-driver
  clusterSelector:
    matchLabels:
      azuredisk-csi: "true"
  namespace: kube-system
  releaseName: azuredisk-csi-driver-oot
  repoURL: https://raw.githubusercontent.com/kubernetes-sigs/azuredisk-csi-driver/master/charts
  valuesTemplate: |-
    controller:
      replicas: 1
      runOnControlPlane: true
    windows:
      useHostProcessContainers: {{ hasKey .Cluster.metadata.labels "cni-windows" }}
---
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: cloud-provider-azure-chart
  namespace: default
spec:
  chartName: cloud-provider-azure
  clusterSelector:
    matchLabels:
      cloud-provider: azure
  releaseName: cloud-provider-azure-oot
  repoURL: https://raw.githubusercontent.com/kubernetes-sigs/cloud-provider-azure/master/helm/repo
  valuesTemplate: |
    infra:
      clusterName: {{ .Cluster.metadata.name }}
    cloudControllerManager:
      clusterCIDR: {{ .Cluster.spec.clusterNetwork.pods.cidrBlocks | join "," }}
      logVerbosity: 4
---
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: cloud-provider-azure-chart-ci
  namespace: default
spec:
  chartName: cloud-provider-azure
  clusterSelector:
    matchLabels:
      cloud-provider: azure-ci
  releaseName: cloud-provider-azure-oot
  repoURL: https://raw.githubusercontent.com/kubernetes-sigs/cloud-provider-azure/master/helm/repo
  valuesTemplate: |
    infra:
      clusterName: {{ .Cluster.metadata.name }}
    cloudControllerManager:
      cloudConfig: ${CLOUD_CONFIG:-"/etc/kubernetes/azure.json"}
      cloudConfigSecretName: ${CONFIG_SECRET_NAME:-""}
      clusterCIDR: {{ .Cluster.spec.clusterNetwork.pods.cidrBlocks | join "," }}
      imageName: "${CCM_IMAGE_NAME:-""}"
      imageRepository: "${IMAGE_REGISTRY:-""}"
      imageTag: "${IMAGE_TAG_CCM:-""}"
      logVerbosity: ${CCM_LOG_VERBOSITY:-4}
      replicas: ${CCM_COUNT:-1}
      enableDynamicReloading: ${ENABLE_DYNAMIC_RELOADING:-false}
    cloudNodeManager:
      imageName: "${CNM_IMAGE_NAME:-""}"
      imageRepository: "${IMAGE_REGISTRY:-""}"
      imageTag: "${IMAGE_TAG_CNM:-""}"
