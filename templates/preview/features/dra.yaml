# Dynamic Resource Allocation (DRA) — alpha feature that needs more than
# just feature gates: containerd's CDI plugin must be enabled and the
# resource.k8s.io API group versions must be turned on in runtime-config.
#
# Ported from templates/test/ci/patches/dra-kubeadmcontrolplane.yaml. Apply
# with `kubectl patch` after the base cluster is applied, e.g.:
#   kubectl patch kubeadmcontrolplane <cluster>-control-plane \
#     --type json --patch-file features/dra.yaml
- op: add
  path: /spec/kubeadmConfigSpec/files/-
  value:
    content: |
      #!/bin/bash
      echo "enabling containerd CDI plugin"
      sed -i '/\[plugins."io.containerd.grpc.v1.cri"\]/a\    enable_cdi = true' /etc/containerd/config.toml
      systemctl restart containerd
    owner: root:root
    path: /tmp/containerd-config.sh
    permissions: "0744"
- op: add
  path: /spec/kubeadmConfigSpec/preKubeadmCommands/0
  value: bash -c /tmp/containerd-config.sh
# Merge the DRA API group enablement into the existing runtime-config
# (set by alpha-gates-patch to api/all=true). Replacing wholesale would
# disable every other alpha API group.
- op: replace
  path: /spec/kubeadmConfigSpec/clusterConfiguration/apiServer/extraArgs/runtime-config
  value: api/all=true,resource.k8s.io/v1beta1=true,resource.k8s.io/v1beta2=true

